openapi: 3.1.0
info:
  title: SSE Live Ticker API
  version: 1.0.0
  description: REST and SSE API for the BMU1208 SSE Live Ticker final project.
servers:
  - url: http://localhost:3001
security:
  - bearerAuth: []
paths:
  /api/health:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                  time:
                    type: string
                    format: date-time
                  liveMarketData:
                    type: boolean
                  lastProviderSync:
                    type:
                      - string
                      - "null"
                    format: date-time
                  lastProviderError:
                    type:
                      - string
                      - "null"
  /api/config:
    get:
      summary: Public frontend configuration
      security: []
      responses:
        "200":
          description: Client feature flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  googleLoginEnabled:
                    type: boolean
                  googleClientId:
                    type:
                      - string
                      - "null"
  /events:
    get:
      summary: Live ticker Server-Sent Events stream
      security: []
      responses:
        "200":
          description: SSE stream where each event payload is an array of stocks.
          content:
            text/event-stream:
              schema:
                type: string
  /api/stocks:
    get:
      summary: List ticker instruments
      security: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [stock, bist, crypto, forex]
        - in: query
          name: q
          schema:
            type: string
      responses:
        "200":
          description: Market data snapshot
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stock"
  /api/stocks/{symbol}:
    get:
      summary: Get one ticker instrument
      security: []
      parameters:
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: Stock detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stock"
        "404":
          $ref: "#/components/responses/Error"
  /api/auth/register:
    post:
      summary: Register a user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterRequest"
      responses:
        "201":
          description: Created user and token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/auth/login:
    post:
      summary: Login a user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/auth/google:
    post:
      summary: Login or register using a Google Identity Services credential
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthGoogleRequest"
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/auth/forgot-password:
    post:
      summary: Create a password reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset token response for the classroom/demo flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          $ref: "#/components/responses/Error"
  /api/auth/reset-password:
    post:
      summary: Set a new password with a reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/auth/refresh:
    post:
      summary: Rotate refresh token and issue a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Error"
  /api/auth/logout:
    post:
      summary: Revoke the provided refresh token
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Logout accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "401":
          $ref: "#/components/responses/Error"
  /api/me:
    get:
      summary: Current authenticated user
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Error"
  /api/favorites:
    get:
      summary: List current user's watchlist symbols
      responses:
        "200":
          description: Watchlist symbols
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "401":
          $ref: "#/components/responses/Error"
  /api/favorites/{symbol}:
    post:
      summary: Add symbol to watchlist
      parameters:
        - $ref: "#/components/parameters/Symbol"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymbolSuccess"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Remove symbol from watchlist
      parameters:
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymbolSuccess"
  /api/portfolio:
    get:
      summary: List portfolio positions with live valuation
      responses:
        "200":
          description: Portfolio payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      summary: Create or update a portfolio position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioUpsertRequest"
      responses:
        "201":
          description: Saved position
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  position:
                    $ref: "#/components/schemas/PortfolioPosition"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/portfolio/{symbol}:
    delete:
      summary: Delete a portfolio position
      parameters:
        - $ref: "#/components/parameters/Symbol"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymbolSuccess"
        "401":
          $ref: "#/components/responses/Error"
  /api/alerts:
    get:
      summary: List price alerts
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
    post:
      summary: Create a price alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertRequest"
      responses:
        "201":
          description: Created alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertCreateResponse"
        "400":
          $ref: "#/components/responses/Error"
  /api/alerts/{id}:
    delete:
      summary: Delete a price alert
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Symbol:
      in: path
      name: symbol
      required: true
      schema:
        type: string
      example: AAPL
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Stock:
      type: object
      required: [symbol, name, price, changePct, type, source]
      properties:
        symbol:
          type: string
        name:
          type: string
        sector:
          type: string
        price:
          type: number
        change:
          type: number
        changePct:
          type: number
        direction:
          type: string
          enum: [up, down, neutral]
        volume:
          type: integer
        type:
          type: string
          enum: [stock, bist, crypto, forex]
        source:
          type: string
        updatedAt:
          type: string
          format: date-time
    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        created_at:
          type: string
    AuthRegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthGoogleRequest:
      type: object
      required: [credential]
      properties:
        credential:
          type: string
          description: Google Identity Services ID token credential.
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ForgotPasswordResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        reset_token:
          type:
            - string
            - "null"
          description: Returned directly for the classroom/demo flow.
        expires_at:
          type:
            - string
            - "null"
          format: date-time
        delivery:
          type: string
    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8
    AuthResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        token:
          type: string
          description: Backward-compatible alias of access_token.
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: string
          example: 15m
        refresh_token_expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"
    PortfolioUpsertRequest:
      type: object
      required: [symbol, quantity, average_price]
      properties:
        symbol:
          type: string
        quantity:
          type: number
          minimum: 0
        average_price:
          type: number
          minimum: 0
    PortfolioPosition:
      type: object
      properties:
        id:
          type: integer
        symbol:
          type: string
        name:
          type: string
        type:
          type:
            - string
            - "null"
        quantity:
          type: number
        average_price:
          type: number
        current_price:
          type: number
        market_value:
          type: number
        cost_basis:
          type: number
        pnl:
          type: number
        pnl_pct:
          type: number
        updated_at:
          type: string
    PortfolioResponse:
      type: object
      properties:
        positions:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioPosition"
        summary:
          type: object
          properties:
            market_value:
              type: number
            cost_basis:
              type: number
            pnl:
              type: number
            pnl_pct:
              type: number
    CreateAlertRequest:
      type: object
      required: [symbol, target_price, direction]
      properties:
        symbol:
          type: string
        target_price:
          type: number
          minimum: 0
        direction:
          type: string
          enum: [above, below]
    Alert:
      type: object
      properties:
        id:
          type: integer
        symbol:
          type: string
        target_price:
          type: number
        direction:
          type: string
          enum: [above, below]
        created_at:
          type: string
    AlertCreateResponse:
      allOf:
        - $ref: "#/components/schemas/Success"
        - $ref: "#/components/schemas/Alert"
    Success:
      type: object
      properties:
        success:
          type: boolean
    SymbolSuccess:
      type: object
      properties:
        success:
          type: boolean
        symbol:
          type: string
    Error:
      type: object
      properties:
        error:
          type: string
